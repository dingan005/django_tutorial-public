{% extends "base.html" %}

{% block title %} 
<title>Contact Us - City Hospital</title>
{% endblock %} 

{% block content %}
<div class="container mt-5 mb-5">
    <h2 class="text-center mb-4">Contact Us</h2>

    <div class="row">

        <!-- Contact Form -->
        <div class="col-md-6">
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name" required>
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                    <label>Message</label>
                    <textarea class="form-control" rows="4" placeholder="Enter your message"></textarea>
                </div>

                <button class="btn btn-success">
                    Send Message
                </button>
            </form>
        </div>

        <!-- Contact Details -->
        <div class="col-md-6">
            <h5>Hospital Information</h5>
            <p><strong>Address:</strong> Kochi, Kerala, India</p>
            <p><strong>Phone:</strong> +91 9876543210</p>
            <p><strong>Email:</strong> info@cityhospital.com</p>

            <!-- Map -->
            <iframe 
                src="https://maps.google.com/maps?q=calicut&t=&z=13&ie=UTF8&iwloc=&output=embed"
                width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>

    </div>
</div>
{% endblock %}
